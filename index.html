
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>엄친 가족들 푸꾸옥 여행 노트</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#f3f7ff" />
</head>

<body>
  <div class="wrap">

    <!-- ✅ topbar는 딱 1개만 (tips 구조와 동일) -->
    <div class="topbar topbar--sticky topbar--withTitle">
      <div class="menuWrap">
        <button class="menuBtn" id="menuBtn" type="button">☰ 목록</button>
        <div class="menuPanel" id="menuPanel">
          <a class="menuItem" href="./tips.html">일정</a>
          <a class="menuItem" href="./spots.html">관광</a>
          <a class="menuItem" href="./food.html">맛집</a>
          <a class="menuItem" href="./마사지.html">마사지</a>
          <a class="menuItem" href="./resort.html">숙소 정보(빈펄 원더월드)</a>
          <a class="menuItem" href="./cost.html">비용 계산</a>
        </div>
      </div>

      <div class="topbarTitle">엄친 가족들 푸꾸옥 여행</div>

<!-- ✅ 빈자리(보이진 않음) -->
<div class="rightSpacer" aria-hidden="true"></div>
      </div>

    <!-- 배너 사진 -->
    <div class="banner">
      <img src="./assets/cover.jpg" alt="메인 사진" />
    </div>

  </div>

  <script>
    (function(){
      const btn = document.getElementById("menuBtn");
      const panel = document.getElementById("menuPanel");
      if(!btn || !panel) return;

      btn.addEventListener("click", () => panel.classList.toggle("open"));

      document.addEventListener("click", (e) => {
        if(!panel.classList.contains("open")) return;
        if(panel.contains(e.target) || btn.contains(e.target)) return;
        panel.classList.remove("open");
      });

      document.addEventListener("keydown", (e) => {
        if(e.key === "Escape") panel.classList.remove("open");
      });
    })();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
