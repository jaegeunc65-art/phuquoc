<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>엄친 가족들 푸꾸옥 여행 노트</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#f3f7ff" />
</head>

<body class="home">
  <div class="wrap">

    <!-- ✅ 다른 페이지와 동일한 구조: wrap 안 topbar -->
    <div class="topbar topbar--sticky topbar--withTitle">
      <div class="menuWrap">
        <button class="menuBtn" id="menuBtn" type="button">☰ 목록</button>
        <div class="menuPanel" id="menuPanel">
          <a class="menuItem" href="./tips.html">일정</a>
          <a class="menuItem" href="./spots.html">관광</a>
          <a class="menuItem" href="./food.html">먹거리</a>
        </div>
      </div>

      <!-- ✅ 가운데 제목(진짜 가운데 고정) -->
      <div class="topbarTitle">엄친 가족들 푸꾸옥 여행</div>

      <!-- 오른쪽 공간(균형용/나중에 버튼 넣어도 됨) -->
      <div class="badge">엄궁 가족들</div>
    </div>

    <!-- ✅ 메인 사진: 모바일 폭 느낌으로 가운데 -->
    <div class="homeHeroCard">
      <img class="homeHeroImg" src="./assets/cover.jpg" alt="푸꾸옥 메인 사진" />
    </div>

  </div>

  <script>
    (function(){
      const btn = document.getElementById("menuBtn");
      const panel = document.getElementById("menuPanel");
      if(!btn || !panel) return;

      btn.addEventListener("click", () => panel.classList.toggle("open"));

      document.addEventListener("click", (e) => {
        if(!panel.classList.contains("open")) return;
        if(panel.contains(e.target) || btn.contains(e.target)) return;
        panel.classList.remove("open");
      });
    })();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
