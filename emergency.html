<body>

</div>
    <div class="header">
      <div class="title">비상 · 연락처</div>
      <a class="badge" href="./index.html">← 메인</a>
    </div>

    <div class="section">
      <h2>연락처</h2>
      <div class="list">
        <div class="item">
          <div class="h"><b>숙소</b><span>전화/주소</span></div>
          <p>전화: +84-xx-xxxx-xxxx
주소: (여기에 숙소 주소)</p>
        </div>
        <div class="item">
          <div class="h"><b>픽업/샌딩</b><span>기사/업체</span></div>
          <p>카톡/왓츠앱: (여기에)
차량번호: (여기에)</p>
        </div>
        <div class="item">
          <div class="h"><b>보험/대사관</b><span>필요시</span></div>
          <p>보험 콜센터:
대사관:</p>
        </div>
      </div>
      <div class="footer">이 페이지는 진짜 급할 때 꺼내보기 좋게 최대한 단순하게 두는 게 좋습니다.</div>
    </div>
  </div>
<script>
  (function(){
    const btn = document.getElementById("menuBtn");
    const panel = document.getElementById("menuPanel");
    if(!btn || !panel) return;

    btn.addEventListener("click", () => {
      panel.classList.toggle("open");
    });

    // 바깥 클릭하면 닫기
    document.addEventListener("click", (e) => {
      if(!panel.classList.contains("open")) return;
      if(panel.contains(e.target) || btn.contains(e.target)) return;
      panel.classList.remove("open");
    });
  })();
</script>
</body>
