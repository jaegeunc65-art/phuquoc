<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>맛집</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
<div class="topbar">
  <div class="menuWrap">
    <button class="menuBtn" id="menuBtn" type="button">☰ 목록</button>
    <div class="menuPanel" id="menuPanel">
      <a class="menuItem" href="./tips.html">일정</a>
      <a class="menuItem" href="./spots.html">관광</a>
      <a class="menuItem" href="./food.html">먹거리</a>
    </div>
  </div>
  <div class="badge"><a href="./index.html">← 메인</a></div>
</div>
    <div class="header">
      <div class="title">맛집</div>
      <a class="badge" href="./index.html">← 메인</a>
    </div>

    <div class="hero">
      <img src="./assets/food1.jpg" alt="food" />
      <div class="heroText">
        <h1>맛집 메모</h1>
        <p>가게명 / 위치 / 메뉴 / 예약 / 가격대 같은 것만 적어두면 진짜 편합니다.</p>
      </div>
    </div>

    <div class="section">
      <h2>리스트</h2>
      <div class="list">
        <div class="item">
          <div class="h"><b>해산물 식당 A</b><span>대표: 랍스터</span></div>
          <p>메모: 늦게 가면 웨이팅 / 현금 필요</p>
        </div>
        <div class="item">
          <div class="h"><b>분짜 맛집 B</b><span>점심</span></div>
          <p>메모: 매운 소스 주의</p>
        </div>
      </div>
    </div>
  </div>
<script>
  (function(){
    const btn = document.getElementById("menuBtn");
    const panel = document.getElementById("menuPanel");
    if(!btn || !panel) return;

    btn.addEventListener("click", () => {
      panel.classList.toggle("open");
    });

    // 바깥 클릭하면 닫기
    document.addEventListener("click", (e) => {
      if(!panel.classList.contains("open")) return;
      if(panel.contains(e.target) || btn.contains(e.target)) return;
      panel.classList.remove("open");
    });
  })();
</script>
</body>
</html>
