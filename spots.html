<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>관광 · 일정</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
<div class="topbar">
  <div class="menuWrap">
    <button class="menuBtn" id="menuBtn" type="button">☰ 목록</button>
    <div class="menuPanel" id="menuPanel">
      <a class="menuItem" href="./tips.html">일정</a>
      <a class="menuItem" href="./spots.html">관광</a>
      <a class="menuItem" href="./food.html">먹거리</a>
    </div>
  </div>
  <div class="badge"><a href="./index.html">← 메인</a></div>
</div>
    <div class="header">
      <div class="title">관광 · 일정</div>
      <a class="badge" href="./index.html">← 메인</a>
    </div>

    <div class="hero">
      <img src="./assets/spot1.jpg" alt="spot" />
      <div class="heroText">
        <h1>핵심 코스</h1>
        <p>여기에 “일정/동선/예약정보”를 붙여넣으면 끝입니다.</p>
      </div>
    </div>

    <div class="section">
      <h2>리스트</h2>
      <div class="list">
        <div class="item">
          <div class="h"><b>선셋 사나토</b><span>16:30~</span></div>
          <p>주소/이동방법/팁 메모</p>
        </div>
        <div class="item">
          <div class="h"><b>빈원더스/사파리</b><span>오전 추천</span></div>
          <p>입장권/셔틀/유의사항</p>
        </div>
      </div>
    </div>

    <div class="footer">내용 수정: 이 파일에서 텍스트만 바꾸면 됩니다.</div>
  </div>
<script>
  (function(){
    const btn = document.getElementById("menuBtn");
    const panel = document.getElementById("menuPanel");
    if(!btn || !panel) return;

    btn.addEventListener("click", () => {
      panel.classList.toggle("open");
    });

    // 바깥 클릭하면 닫기
    document.addEventListener("click", (e) => {
      if(!panel.classList.contains("open")) return;
      if(panel.contains(e.target) || btn.contains(e.target)) return;
      panel.classList.remove("open");
    });
  })();
</script>
</body>
</html>
