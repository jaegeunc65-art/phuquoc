<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>팁 · 준비물</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
<div class="topbar">
  <div class="menuWrap">
    <button class="menuBtn" id="menuBtn" type="button">☰ 목록</button>
    <div class="menuPanel" id="menuPanel">
      <a class="menuItem" href="./tips.html">일정</a>
      <a class="menuItem" href="./spots.html">관광</a>
      <a class="menuItem" href="./food.html">먹거리</a>
    </div>
  </div>
  <div class="badge"><a href="./index.html">← 메인</a></div>
</div>
    <div class="header">
      <div class="title">팁 · 준비물</div>
      <a class="badge" href="./index.html">← 메인</a>
    </div>

    <div class="hero">
      <img src="./assets/tip1.jpg" alt="tips" />
      <div class="heroText">
        <h1>체크리스트</h1>
        <p>여긴 “짧은 팁”이랑 “준비물” 적기 좋습니다.</p>
      </div>
    </div>

    <div class="section">
      <h2>준비물</h2>
      <div class="list">
        <div class="item"><div class="h"><b>필수</b><span></span></div><p>여권 / 충전기 / 보조배터리 / 상비약</p></div>
        <div class="item"><div class="h"><b>있으면 편함</b><span></span></div><p>모기기피제 / 멀티어댑터 / 방수팩</p></div>
      </div>
    </div>
  </div>
<script>
  (function(){
    const btn = document.getElementById("menuBtn");
    const panel = document.getElementById("menuPanel");
    if(!btn || !panel) return;

    btn.addEventListener("click", () => {
      panel.classList.toggle("open");
    });

    // 바깥 클릭하면 닫기
    document.addEventListener("click", (e) => {
      if(!panel.classList.contains("open")) return;
      if(panel.contains(e.target) || btn.contains(e.target)) return;
      panel.classList.remove("open");
    });
  })();
</script>
</body>
</html>
